# Creates a deploy user with passwordless sudo and SSH key access.

- name: Create deploy user
  user:
    name: "{{ deploy_user }}"
    shell: /bin/bash
    groups: sudo
    append: true
    create_home: true

- name: Allow passwordless sudo for deploy user
  copy:
    dest: "/etc/sudoers.d/{{ deploy_user }}"
    content: "{{ deploy_user }} ALL=(ALL) NOPASSWD:ALL"
    owner: root
    group: root
    mode: 0440  # sudoers files must not be world-readable

- name: Add SSH key for deploy user
  authorized_key:
    user: "{{ deploy_user }}"
    key: "{{ lookup('file', ssh_public_key_path) }}"