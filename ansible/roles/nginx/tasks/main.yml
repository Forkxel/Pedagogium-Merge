# Deploys Nginx (Alpine) in Docker as a reverse proxy with TLS. Also starts nginx_exporter.

- name: Ensure certs dir exists
  file:
    path: /home/ansible/certs
    state: directory
    owner: ansible
    group: ansible
    mode: "0700"  # Private key must not be world-readable

- name: Copy TLS certificate
  copy:
    src: /home/icykcypher/local.dev.crt
    dest: /home/ansible/certs/local.dev.crt
    owner: root
    group: root
    mode: "0644"

- name: Copy TLS private key
  copy:
    src: /home/icykcypher/local.dev.key
    dest: /home/ansible/certs/local.dev.key
    owner: root
    group: root
    mode: "0600"

- name: Ensure Nginx config dir exists
  file:
    path: /opt/nginx
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render nginx config  # Also called during backend deploy to switch upstream port
  template:
    src: default.conf.j2
    dest: /opt/nginx/default.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart nginx

- name: Run Nginx container
  docker_container:
    name: nginx
    image: nginx:alpine
    state: started
    restart_policy: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/app/frontend/current:/usr/share/nginx/html:ro
      - /opt/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/ansible/certs:/etc/nginx/certs:ro
    networks:
      - name: monitoring

- name: Run Nginx Prometheus exporter container  # Exposes Nginx metrics on port 9113
  docker_container:
    name: nginx_exporter
    image: nginx/nginx-prometheus-exporter:edge
    state: started
    restart_policy: always
    command: -nginx.scrape-uri https://nginx:443/nginx_status
    ports:
      - "9113:9113"
    networks:
      - name: monitoring