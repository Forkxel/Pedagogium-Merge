# Configures UFW with default-deny policy. Opens only required ports.
# Must run after all services are up — enabling UFW with SSH closed would drop the connection.

- name: Allow HTTP
  ufw:
    rule: allow
    port: 80
    proto: tcp

- name: Allow HTTPS
  ufw:
    rule: allow
    port: 443
    proto: tcp

- name: Allow monitoring ports (optional)
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "{{ grafana_port }}"
    - "{{ prometheus_port }}"

- name: Allow ssh
  ufw:
    rule: allow
    port: 22
    proto: tcp

- name: Allow postgres
  ufw:
    rule: allow
    port: 5432
    proto: tcp

- name: Enable UFW
  ufw:
    state: enabled
    policy: deny  # Default deny all incoming