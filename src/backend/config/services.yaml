# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'

    # ===== RATE LIMITERS =====

    scoreSubmitLimiter:
        class: Symfony\Component\RateLimiter\RateLimiterFactory
        factory: ['@limiter.score_submit', 'create']

    loginApiLimiter:
        class: Symfony\Component\RateLimiter\RateLimiterFactory
        factory: ['@limiter.login_api', 'create']

    utmTrackLimiter:
        class: Symfony\Component\RateLimiter\RateLimiterFactory
        factory: ['@limiter.utm_track', 'create']

    # ===== REQUEST SIZE LIMIT =====

    App\EventListener\RequestSizeListener:
        arguments:
            $maxSize: 1048576 # 1MB
        tags:
            - { name: kernel.event_listener, event: kernel.request, method: onKernelRequest }
