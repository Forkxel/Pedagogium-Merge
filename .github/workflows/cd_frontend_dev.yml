name: CD frontend dev

on:
  push:
    branches: [main]
    paths:
      - 'src/frontend/**'
      
jobs:
  frontend-cd-dev:
    runs-on: [ubuntu-latest]
    environment: dev
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Build frontend
        working-directory: src/frontend
        run: npm run build

      - name: Generate release name
        id: release
        run: |
          echo "RELEASE_NAME=$(date -u +%Y%m%dT%H%M%SZ)" >> $GITHUB_ENV
          
      - name: Create frontend release archive
        working-directory: src/frontend
        run: |
          tar -czf dist.tar.gz dist
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: frontend-${{ env.RELEASE_NAME }}
          name: Frontend release ${{ env.RELEASE_NAME }}
          files: src/frontend/dist.tar.gz
